# school-os/docker-compose.yml

version: "3.9"

services:

  # ── 1. PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:15
    container_name: school_postgres
    restart: always
    environment:
      POSTGRES_USER: schooladmin
      POSTGRES_PASSWORD: schoolpass123
      POSTGRES_DB: schoolos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── 2. Redis (used for cache + events + celery queue) ───────
  redis:
    image: redis:7-alpine
    container_name: school_redis
    restart: always
    ports:
      - "6379:6379"

  # ── 3. Adminer (visual DB browser — open at localhost:8080) ─
  adminer:
    image: adminer
    container_name: school_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # ── 4. FastAPI Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── 5. Celery Worker (runs agent tasks in background) ───────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_celery
    restart: always
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks worker --loglevel=info --pool=solo

  # ── 6. Celery Beat (cron scheduler) ─────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_celery_beat
    restart: always
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks beat --loglevel=info

  # ── 7. Event Subscriber (Redis Pub/Sub listener) ─────────────
  event-sub:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_event_sub
    restart: always
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    command: python -m app.events.subscriber

  # ── 8. Flower (Celery task monitor — open at localhost:5555) ─
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_flower
    restart: always
    ports:
      - "5555:5555"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    command: celery -A app.tasks flower --port=5555

volumes:
  postgres_data: